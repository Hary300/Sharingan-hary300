<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />

    <link
      rel="icon"
      href="https://files.softicons.com/download/culture-icons/sharingan-icons-1.5-by-harenome-razanajato/png/32x32/itachi-alt.png"
    />
    <title>Sharingan</title>
    <style>
      body {
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 40px;
        height: 100vh;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
      img {
        transition: 1.5s ease;
        animation: rotate 1.5s;
        width: 200px;
      }
      a {
        text-decoration: none;
        color: black;
      }

      a:hover {
        color: gold;
      }

      img:hover {
        transform: rotate(270deg);
      }

      @keyframes rotate {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="./images/common-sharingan.webp" alt="" />
      <img src="./images/itachi-mangekyou-sharingan.webp" alt="" />
      <img src="./images/sasuke-sharingan.webp" alt="" />
      <img src="./images/sasuke-iternal-sharingan.webp" alt="" />
      <img src="./images/obito-sharingan.webp" alt="" />
      <img src="./images/tsukuyomi.webp" alt="" />
      <img src="./images/madara-mangekyo-sharingan.webp" alt="" />
      <img src="./images/madara-iternal-sharingan.webp" alt="" />
    </div>
    <footer>
      &copy 2026 created by
      <a href="https://github.com/Hary300" target="_blank">Hary300</a>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
