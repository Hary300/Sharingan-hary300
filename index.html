<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />

    <link
      rel="icon"
      href="https://files.softicons.com/download/culture-icons/sharingan-icons-1.5-by-harenome-razanajato/png/32x32/itachi-alt.png"
    />
    <title>Sharingan</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .container {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }
      img {
        transition: 1.5s ease;
        animation: rotate 1.5s;
      }

      img:hover {
        transform: rotate(270deg);
      }

      @keyframes rotate {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img
        src="https://www.pngmart.com/files/12/Mangekyou-Sharingan-PNG-Free-Download.png"
        alt=""
        width="200"
      />
      <img
        src="https://www.nicepng.com/png/full/11-111776_mangekyou-sharingan-itachi-mangekyou-sharingan.png"
        alt=""
        width="200"
      />
      <img
        src="https://www.pngmart.com/files/12/Sharingan-PNG-Free-Download.png"
        alt=""
        width="200"
      />

      <img
        src="https://www.pngmart.com/files/12/Mangekyou-Sharingan-PNG-Transparent.png"
        alt=""
        width="200"
      />
      <img
        src="https://www.pngmart.com/files/12/Mangekyou-Sharingan-PNG-Transparent-Image.png"
        alt=""
        width="200"
      />
      <img
        src="https://www.pngmart.com/files/12/Mangekyou-Sharingan-PNG-Photo.png"
        alt=""
        width="200"
      />
      <img
        src="https://www.pngmart.com/files/12/Sharingan-Transparent-Background.png"
        alt=""
        width="200"
      />
      <img
        src="https://freepngimg.com/download/anime/108015-sharingan-hd-image-free.png"
        alt=""
        width="200"
      />
    </div>

    <script src="script.js"></script>
  </body>
</html>
